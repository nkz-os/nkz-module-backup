apiVersion: v1
kind: Secret
metadata:
  name: backup-secret-tenant-example
  namespace: nekazari
type: Opaque
stringData:
  # The tenant's Restic repository password (generated or provided)
  restic-password: "tenant-secret-password-xyz"

  # The Rclone JSON config including credentials
  # This JSON is parsed by the worker entrypoint to generate rclone.conf
  rclone-config: |
    {
      "type": "s3",
      "provider": "AWS",
      "access_key_id": "AKIA...",
      "secret_access_key": "...",
      "region": "eu-west-1",
      "bucket": "my-backups"
    }
