apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-api
  namespace: nekazari
  labels:
    app: backup-api
    component: backend
    module: backup
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-api
  template:
    metadata:
      labels:
        app: backup-api
        component: backend
        module: backup
    spec:
      serviceAccountName: backup-controller
      containers:
        - name: api
          image: ghcr.io/nkz-os/nkz-module-backup/backup-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            # App
            - name: LOG_LEVEL
              value: "info"
            # CORS — allow the platform frontend
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: backup-config
                  key: CORS_ORIGINS
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: backup-config
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_REALM
              value: "nekazari"
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: backup-config
                  key: JWT_ISSUER
            - name: JWKS_URL
              valueFrom:
                configMapKeyRef:
                  name: backup-config
                  key: JWKS_URL
            - name: JWT_AUDIENCE
              value: "account"
            # K8s
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BACKUP_WORKER_IMAGE
              value: "ghcr.io/nkz-os/nkz-module-backup/backup-worker:latest"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backup-api-service
  namespace: nekazari
  labels:
    app: backup-api
    component: backend
    module: backup
spec:
  selector:
    app: backup-api
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
