apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-api
  namespace: nekazari
  labels:
    app: backup-api
    component: backend
    module: backup
    nekazari.io/profile: addon
spec:
  replicas: 1 # Start with 1 for testing as requested
  selector:
    matchLabels:
      app: backup-api
  template:
    metadata:
      labels:
        app: backup-api
        component: backend
        module: backup
    spec:
      serviceAccountName: backup-controller # Needed for CronJob management
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api
          image: ghcr.io/k8-benetis/nkz-module-backup/backup-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            # App Config
            - name: LOG_LEVEL
              value: "info"
            # Database (use existing postgresql-secret)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            # Redis
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            # Keycloak
            - name: KEYCLOAK_URL
              value: "https://auth.robotika.cloud/auth"
            - name: KEYCLOAK_REALM
              value: "nekazari"
            - name: JWT_ISSUER
              value: "https://auth.robotika.cloud/auth/realms/nekazari"
            - name: JWKS_URL
              value: "https://auth.robotika.cloud/auth/realms/nekazari/protocol/openid-connect/certs"
            # K8s Config
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BACKUP_WORKER_IMAGE
              value: "ghcr.io/k8-benetis/nkz-module-backup/backup-backend:latest"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backup-api-service
  namespace: nekazari
  labels:
    app: backup-api
    component: backend
    module: backup
spec:
  selector:
    app: backup-api
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
